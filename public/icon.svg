<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Shine overlay -->
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="url(#shineGrad)" opacity="0.5"/>
  <rect x="16" y="136" width="480" height="120" fill="url(#shineGrad)" opacity="0.3"/>
  <!-- Inner subtle border -->
  <rect x="28" y="28" width="456" height="456" rx="84" ry="84" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- GN Text -->
  <text x="256" y="300" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="220" font-weight="700" fill="white" filter="url(#textShadow)" letter-spacing="-8">GN</text>
  <!-- Small accent line under text -->
  <line x1="140" y1="340" x2="372" y2="340" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
</svg>
